<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Maze Runner Ad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style type="text/css">
    html, body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #overlay-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #minimap {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid rgba(0,255,0,0.5);
      background: rgba(0,0,0,0.6);
      display: none;
    }
    #hud {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 4px #000;
    }
    #game-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 18px;
      z-index: 10;
    }
    #game-overlay.hidden { display: none; }
    #game-overlay h1 {
      font-size: 36px;
      margin: 0 0 6px 0;
      text-shadow: 0 0 10px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.6);
    }
    #game-overlay .sub {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 20px;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    #game-overlay .text-backdrop {
      background: rgba(0,0,0,0.6);
      padding: 20px 30px;
      border-radius: 8px;
    }

    /* Mobile touch controls — hidden on desktop, shown on touch devices */
    #mobile-time { display: none; }
    #touch-controls { display: none; }
    @media (pointer: coarse) {
      #touch-controls {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 8;
      }
      #touch-controls .touch-btn {
        position: absolute;
        pointer-events: auto;
        width: 52px;
        height: 52px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 8px;
        color: rgba(255,255,255,0.6);
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #touch-controls .touch-btn:active,
      #touch-controls .touch-btn.active {
        background: rgba(255,255,255,0.3);
        border-color: rgba(255,255,255,0.5);
      }
      /* D-pad: bottom-center */
      #touch-fwd    { left: 50%; margin-left: -26px; bottom: 120px; }
      #touch-back   { left: 50%; margin-left: -26px; bottom: 10px; }
      #touch-left   { left: 50%; margin-left: -84px; bottom: 65px; }
      #touch-right  { left: 50%; margin-left: 32px;  bottom: 65px; }
      #mobile-time {
        display: block;
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 11px;
        text-align: center;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
        z-index: 9;
      }
      /* Hide main HUD on mobile — time is shown below controls */
      #hud { display: none; }
      #game-overlay h1 { font-size: 22px; }
      #game-overlay .sub { font-size: 11px; }
      #game-overlay {
        padding: 0 40px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div id="overlay-container">
    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <canvas id="minimap" width="140" height="140"></canvas>
    <div id="hud"></div>
    <div id="mobile-time"></div>
    <div id="touch-controls">
      <div id="touch-fwd" class="touch-btn" data-key="w">&#9650;</div>
      <div id="touch-back" class="touch-btn" data-key="s">&#9660;</div>
      <div id="touch-left" class="touch-btn" data-key="a">&#9664;</div>
      <div id="touch-right" class="touch-btn" data-key="d">&#9654;</div>
    </div>
    <div id="game-overlay">
      <div class="text-backdrop">
        <h1>Looking to skip the ad?</h1>
        <div class="sub">Click to begin navigating to the skip.</div>
        <div class="sub" style="margin-top:10px;font-size:11px;color:#999">Navigate the maze to skip.</div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
  (function(window, document) {

    function adSuccess() {
      window.top.postMessage({ type: 'success' }, '*');
    }

    function sendToShell(message) {
      window.top.postMessage(message, '*');
    }

    // ============================================================
    // TUNING PARAMETERS
    // Change these to adjust the game feel
    // ============================================================

    // Map size: 'SMALL' (8x8), 'MEDIUM' (10x10), 'LARGE' (12x12)
    // Tip: Cmd/Ctrl + Shift + Click on start to enable debug mode (shows minimap + skip distance)
    var MAP_SIZE = 'MEDIUM';

    // How big the enemy video cutout appears (higher = bigger)
    var ENEMY_DISPLAY_SCALE = 0.9;

    // Enemy movement speed (tiles per second)
    var ENEMY_MOVE_SPEED = 1.4;

    // Seconds before the enemy starts chasing
    var ENEMY_ACTIVATION_DELAY = 3;

    // Player movement speed (tiles per second)
    var PLAYER_MOVE_SPEED = 2.5;

    // Player rotation speed (radians per second)
    var PLAYER_TURN_SPEED = 2.2;

    // Volume when enemy is at max distance (0 to 1)
    var VOLUME_MINIMUM = 0.05;

    // Volume when enemy is right next to you (0 to 1)
    var VOLUME_MAXIMUM = 1.0;

    // How quickly volume ramps up with proximity (1 = linear, 2 = quadratic, 3 = cubic)
    var VOLUME_FALLOFF_CURVE = 2;

    // Max distance at which enemy audio is audible (in tiles)
    var VOLUME_HEARING_RANGE = 14;

    // If true, touching the enemy fails the ad (game over). If false, enemy just blocks your path.
    var ENEMY_CONTACT_FAILS = true;

    // ============================================================
    // DERIVED CONFIG (don't edit unless you know what you're doing)
    // ============================================================
    var MAP_DIMENSIONS = { SMALL: 8, MEDIUM: 10, LARGE: 12 };
    var mazeGridSize = MAP_DIMENSIONS[MAP_SIZE] || 10;

    var CONFIG = {
      fieldOfView: Math.PI / 3,
      rayCount: 320,
      maxRenderDepth: 20,
      playerMoveSpeed: PLAYER_MOVE_SPEED,
      playerTurnSpeed: PLAYER_TURN_SPEED,
      enemyMoveSpeed: ENEMY_MOVE_SPEED,
      enemyActivationDelay: ENEMY_ACTIVATION_DELAY,
      enemyDisplayScale: ENEMY_DISPLAY_SCALE,
    };

    // ============================================================

    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');
    var minimapCanvas = document.getElementById('minimap');
    var minimapCtx = minimapCanvas.getContext('2d');
    var hud = document.getElementById('hud');
    var gameOverlay = document.getElementById('game-overlay');
    var mobileTimeDisplay = document.getElementById('mobile-time');
    var isTouchDevice = window.matchMedia('(pointer: coarse)').matches;

    // ============================================================
    // MAZE GENERATION
    // Uses a recursive backtracker to carve a perfect maze, then
    // breaks ~35% of interior walls to create loops (prevents
    // simple wall-following). Long edge corridors get pillars
    // added, with a flood-fill solvability check after each one.
    // Returns a 2D tile grid where 1=wall, 0=open.
    // ============================================================
    function generateMaze(mazeCols, mazeRows) {
      var cells = [];
      for (var cellY = 0; cellY < mazeRows; cellY++) {
        for (var cellX = 0; cellX < mazeCols; cellX++) {
          cells.push({ x: cellX, y: cellY, walls: [true, true, true, true], visited: false });
        }
      }
      var getCell = function(cellX, cellY) {
        if (cellX < 0 || cellX >= mazeCols || cellY < 0 || cellY >= mazeRows) return null;
        return cells[cellY * mazeCols + cellX];
      };
      var carveStack = [];
      var startCell = getCell(0, 0);
      startCell.visited = true;
      carveStack.push(startCell);
      while (carveStack.length > 0) {
        var currentCell = carveStack[carveStack.length - 1];
        var unvisitedNeighbors = [
          { cell: getCell(currentCell.x, currentCell.y - 1), dir: 0 },
          { cell: getCell(currentCell.x + 1, currentCell.y), dir: 1 },
          { cell: getCell(currentCell.x, currentCell.y + 1), dir: 2 },
          { cell: getCell(currentCell.x - 1, currentCell.y), dir: 3 },
        ].filter(function(neighbor) { return neighbor.cell && !neighbor.cell.visited; });
        if (unvisitedNeighbors.length === 0) {
          carveStack.pop();
        } else {
          var chosenNeighbor = unvisitedNeighbors[Math.floor(Math.random() * unvisitedNeighbors.length)];
          currentCell.walls[chosenNeighbor.dir] = false;
          chosenNeighbor.cell.walls[(chosenNeighbor.dir + 2) % 4] = false;
          chosenNeighbor.cell.visited = true;
          carveStack.push(chosenNeighbor.cell);
        }
      }
      var gridWidth = mazeCols * 2 + 1;
      var gridHeight = mazeRows * 2 + 1;
      var grid = [];
      for (var gridY = 0; gridY < gridHeight; gridY++) {
        grid[gridY] = [];
        for (var gridX = 0; gridX < gridWidth; gridX++) {
          grid[gridY][gridX] = 1;
        }
      }
      for (var cellY = 0; cellY < mazeRows; cellY++) {
        for (var cellX = 0; cellX < mazeCols; cellX++) {
          var cell = getCell(cellX, cellY);
          var tileX = cellX * 2 + 1;
          var tileY = cellY * 2 + 1;
          grid[tileY][tileX] = 0;
          if (!cell.walls[0]) grid[tileY - 1][tileX] = 0;
          if (!cell.walls[1]) grid[tileY][tileX + 1] = 0;
          if (!cell.walls[2]) grid[tileY + 1][tileX] = 0;
          if (!cell.walls[3]) grid[tileY][tileX - 1] = 0;
        }
      }
      // Break walls to create loops
      var breakableWalls = [];
      for (var gridY = 1; gridY < gridHeight - 1; gridY++) {
        for (var gridX = 1; gridX < gridWidth - 1; gridX++) {
          if (grid[gridY][gridX] !== 1) continue;
          if (grid[gridY][gridX-1] === 0 && grid[gridY][gridX+1] === 0 && grid[gridY-1][gridX] === 1 && grid[gridY+1][gridX] === 1)
            breakableWalls.push({ x: gridX, y: gridY });
          if (grid[gridY-1][gridX] === 0 && grid[gridY+1][gridX] === 0 && grid[gridY][gridX-1] === 1 && grid[gridY][gridX+1] === 1)
            breakableWalls.push({ x: gridX, y: gridY });
        }
      }
      for (var shuffleIdx = breakableWalls.length - 1; shuffleIdx > 0; shuffleIdx--) {
        var swapIdx = Math.floor(Math.random() * (shuffleIdx + 1));
        var temp = breakableWalls[shuffleIdx];
        breakableWalls[shuffleIdx] = breakableWalls[swapIdx];
        breakableWalls[swapIdx] = temp;
      }
      var wallsToRemove = Math.floor(breakableWalls.length * 0.35);
      for (var removeIdx = 0; removeIdx < wallsToRemove; removeIdx++) {
        grid[breakableWalls[removeIdx].y][breakableWalls[removeIdx].x] = 0;
      }

      // Break long edge corridors with pillars
      var canSolve = function() {
        var visited = {};
        var floodStack = ['1,1'];
        visited['1,1'] = true;
        var targetKey = (gridWidth - 2) + ',' + (gridHeight - 2);
        while (floodStack.length > 0) {
          var currentKey = floodStack.pop();
          if (currentKey === targetKey) return true;
          var parts = currentKey.split(',');
          var currentX = +parts[0], currentY = +parts[1];
          var directions = [[0,-1],[1,0],[0,1],[-1,0]];
          for (var dirIdx = 0; dirIdx < directions.length; dirIdx++) {
            var neighborX = currentX + directions[dirIdx][0];
            var neighborY = currentY + directions[dirIdx][1];
            var neighborKey = neighborX + ',' + neighborY;
            if (neighborX >= 0 && neighborX < gridWidth && neighborY >= 0 && neighborY < gridHeight &&
                grid[neighborY][neighborX] === 0 && !visited[neighborKey]) {
              visited[neighborKey] = true;
              floodStack.push(neighborKey);
            }
          }
        }
        return false;
      };
      var edgeMargin = 2;
      var maxCorridorRun = 3;
      var pillarCandidates = [];
      for (var gridY = 1; gridY < gridHeight - 1; gridY++) {
        if (gridY > edgeMargin && gridY < gridHeight - 1 - edgeMargin) continue;
        var runStart = -1;
        for (var gridX = 1; gridX <= gridWidth; gridX++) {
          var isOpen = gridX < gridWidth && grid[gridY][gridX] === 0;
          if (isOpen && runStart === -1) runStart = gridX;
          else if (!isOpen && runStart !== -1) {
            if (gridX - runStart > maxCorridorRun)
              pillarCandidates.push({ x: Math.floor((runStart + gridX - 1) / 2), y: gridY });
            runStart = -1;
          }
        }
      }
      for (var gridX = 1; gridX < gridWidth - 1; gridX++) {
        if (gridX > edgeMargin && gridX < gridWidth - 1 - edgeMargin) continue;
        var runStart = -1;
        for (var gridY = 1; gridY <= gridHeight; gridY++) {
          var isOpen = gridY < gridHeight && grid[gridY][gridX] === 0;
          if (isOpen && runStart === -1) runStart = gridY;
          else if (!isOpen && runStart !== -1) {
            if (gridY - runStart > maxCorridorRun)
              pillarCandidates.push({ x: gridX, y: Math.floor((runStart + gridY - 1) / 2) });
            runStart = -1;
          }
        }
      }
      for (var candidateIdx = 0; candidateIdx < pillarCandidates.length; candidateIdx++) {
        var candidate = pillarCandidates[candidateIdx];
        if (grid[candidate.y][candidate.x] !== 0) continue;
        grid[candidate.y][candidate.x] = 1;
        if (!canSolve()) grid[candidate.y][candidate.x] = 0;
      }
      return { grid: grid, gridW: gridWidth, gridH: gridHeight };
    }

    // ============================================================
    // GAME STATE
    // Initializes the maze, player, enemy, exit, and teleporters.
    // Player spawns top-left facing an open direction. Enemy spawns
    // on a reachable cell in the farthest 25% from the player.
    // ============================================================
    var state = null;

    function initGame() {
      var maze = generateMaze(mazeGridSize, mazeGridSize);
      var grid = maze.grid;
      var gridWidth = maze.gridW;
      var gridHeight = maze.gridH;

      // Find an open direction for the player to face at spawn
      var spawnDirections = [
        { dx: 1, dy: 0, angle: 0 },
        { dx: 0, dy: 1, angle: Math.PI / 2 },
        { dx: -1, dy: 0, angle: Math.PI },
        { dx: 0, dy: -1, angle: -Math.PI / 2 },
      ];
      var playerSpawnAngle = 0;
      for (var dirIdx = 0; dirIdx < spawnDirections.length; dirIdx++) {
        var direction = spawnDirections[dirIdx];
        var checkX = Math.floor(1.5 + direction.dx);
        var checkY = Math.floor(1.5 + direction.dy);
        if (checkY >= 0 && checkY < gridHeight && checkX >= 0 && checkX < gridWidth && grid[checkY][checkX] === 0) {
          playerSpawnAngle = direction.angle;
          break;
        }
      }

      var exitPosition = { x: gridWidth - 1.5, y: gridHeight - 1.5 };
      grid[gridHeight - 2][gridWidth - 2] = 0;

      // Flood-fill from player start to find all reachable cells
      var reachableCells = [];
      var visitedCells = {};
      var floodStack = ['1,1'];
      visitedCells['1,1'] = true;
      while (floodStack.length > 0) {
        var cellKey = floodStack.pop();
        var keyParts = cellKey.split(',');
        var currentX = +keyParts[0], currentY = +keyParts[1];
        reachableCells.push({ x: currentX, y: currentY });
        var floodDirections = [[0,-1],[1,0],[0,1],[-1,0]];
        for (var dirIdx = 0; dirIdx < floodDirections.length; dirIdx++) {
          var neighborX = currentX + floodDirections[dirIdx][0];
          var neighborY = currentY + floodDirections[dirIdx][1];
          var neighborKey = neighborX + ',' + neighborY;
          if (neighborX >= 0 && neighborX < gridWidth && neighborY >= 0 && neighborY < gridHeight &&
              grid[neighborY][neighborX] === 0 && !visitedCells[neighborKey]) {
            visitedCells[neighborKey] = true;
            floodStack.push(neighborKey);
          }
        }
      }

      // Sort by distance from player (descending), pick enemy spawn from farthest quarter
      reachableCells.sort(function(cellA, cellB) {
        var distA = (cellA.x - 1) * (cellA.x - 1) + (cellA.y - 1) * (cellA.y - 1);
        var distB = (cellB.x - 1) * (cellB.x - 1) + (cellB.y - 1) * (cellB.y - 1);
        return distB - distA;
      });
      var farthestPool = reachableCells.slice(0, Math.max(1, Math.floor(reachableCells.length / 4)));
      var enemySpawnCell = farthestPool[Math.floor(Math.random() * farthestPool.length)];

      var teleporters = [
        { x: gridWidth - 1.5, y: 1.5, pairIdx: 1, color: '#f0f' },
        { x: 1.5, y: gridHeight - 1.5, pairIdx: 0, color: '#0ff' },
      ];
      grid[1][gridWidth - 2] = 0;
      grid[gridHeight - 2][1] = 0;

      state = {
        grid: grid,
        gridW: gridWidth,
        gridH: gridHeight,
        player: { x: 1.5, y: 1.5, angle: playerSpawnAngle },
        enemy: {
          x: enemySpawnCell.x + 0.5,
          y: enemySpawnCell.y + 0.5,
          active: false,
          path: [],
          pathIndex: 0,
          pathRecalcTimer: 0,
        },
        exit: exitPosition,
        teleporters: teleporters,
        teleportCooldown: 0,
        running: false,
        won: false,
        startTime: 0,
        elapsed: 0,
        keys: {},
      };
    }

    // ============================================================
    // BFS PATHFINDING
    // Breadth-first search on the tile grid. Used by the enemy AI
    // to find the shortest path to the player (or a point in front
    // of the player). Returns an array of waypoint coordinates.
    // ============================================================
    function findPath(grid, sourceX, sourceY, goalX, goalY) {
      var startTileX = Math.floor(sourceX);
      var startTileY = Math.floor(sourceY);
      var endTileX = Math.floor(goalX);
      var endTileY = Math.floor(goalY);
      if (startTileX === endTileX && startTileY === endTileY) return [];
      var gridRows = grid.length;
      var gridCols = grid[0].length;
      var visited = {};
      var queue = [{ x: startTileX, y: startTileY, path: [] }];
      visited[startTileX + ',' + startTileY] = true;
      var directions = [[0,-1],[1,0],[0,1],[-1,0]];
      while (queue.length > 0) {
        var current = queue.shift();
        for (var dirIdx = 0; dirIdx < directions.length; dirIdx++) {
          var neighborX = current.x + directions[dirIdx][0];
          var neighborY = current.y + directions[dirIdx][1];
          var neighborKey = neighborX + ',' + neighborY;
          if (neighborX < 0 || neighborX >= gridCols || neighborY < 0 || neighborY >= gridRows) continue;
          if (grid[neighborY][neighborX] === 1 || visited[neighborKey]) continue;
          visited[neighborKey] = true;
          var newPath = current.path.concat([{ x: neighborX + 0.5, y: neighborY + 0.5 }]);
          if (neighborX === endTileX && neighborY === endTileY) return newPath;
          queue.push({ x: neighborX, y: neighborY, path: newPath });
        }
      }
      return [];
    }

    // ============================================================
    // DDA RAYCASTING
    // Digital Differential Analyzer algorithm for fast, accurate
    // raycasting. Steps through grid cells along the ray direction
    // and returns the perpendicular distance to the first wall hit,
    // which side was hit (for shading), and texture coordinate.
    // ============================================================
    function castRayDDA(originX, originY, angle, grid) {
      var rayDirX = Math.cos(angle);
      var rayDirY = Math.sin(angle);
      var currentTileX = Math.floor(originX);
      var currentTileY = Math.floor(originY);
      var deltaDistX = Math.abs(1 / rayDirX);
      var deltaDistY = Math.abs(1 / rayDirY);
      var stepX, stepY, sideDistX, sideDistY;
      if (rayDirX < 0) {
        stepX = -1;
        sideDistX = (originX - currentTileX) * deltaDistX;
      } else {
        stepX = 1;
        sideDistX = (currentTileX + 1 - originX) * deltaDistX;
      }
      if (rayDirY < 0) {
        stepY = -1;
        sideDistY = (originY - currentTileY) * deltaDistY;
      } else {
        stepY = 1;
        sideDistY = (currentTileY + 1 - originY) * deltaDistY;
      }
      var wallSide = 0;
      for (var step = 0; step < 200; step++) {
        if (sideDistX < sideDistY) {
          sideDistX += deltaDistX;
          currentTileX += stepX;
          wallSide = 0;
        } else {
          sideDistY += deltaDistY;
          currentTileY += stepY;
          wallSide = 1;
        }
        if (currentTileY < 0 || currentTileY >= grid.length || currentTileX < 0 || currentTileX >= grid[0].length) break;
        if (grid[currentTileY][currentTileX] === 1) {
          var perpDistance;
          if (wallSide === 0) perpDistance = (currentTileX - originX + (1 - stepX) / 2) / rayDirX;
          else perpDistance = (currentTileY - originY + (1 - stepY) / 2) / rayDirY;
          var hitX = originX + rayDirX * perpDistance;
          var hitY = originY + rayDirY * perpDistance;
          var textureX = wallSide === 0 ? (hitY % 1) : (hitX % 1);
          return { dist: Math.abs(perpDistance), hit: true, side: wallSide, texX: textureX, mapX: currentTileX, mapY: currentTileY };
        }
      }
      return { dist: CONFIG.maxRenderDepth, hit: false, side: 0 };
    }

    // ============================================================
    // RENDERING
    // Draws the first-person view: ceiling with office tile grid
    // lines, floor gradient, raycasted walls with skip-icon
    // textures, teleporter/exit sprites, and the enemy cutout.
    // The enemy is rendered by cutting a hole in the canvas with
    // destination-out compositing, letting the parent shell's
    // video show through - the ad itself becomes the enemy.
    // ============================================================
    var enemyScreenInfo = null;

    function render() {
      var screenWidth = canvas.width;
      var screenHeight = canvas.height;
      enemyScreenInfo = null;

      // Before the game starts, keep canvas transparent so the ad video shows through
      if (!state || !state.running) {
        ctx.clearRect(0, 0, screenWidth, screenHeight);
        return;
      }

      // Ceiling - office drop ceiling tiles
      var ceilingGradient = ctx.createLinearGradient(0, 0, 0, screenHeight / 2);
      ceilingGradient.addColorStop(0, '#707070');
      ceilingGradient.addColorStop(1, '#3a3a3a');
      ctx.fillStyle = ceilingGradient;
      ctx.fillRect(0, 0, screenWidth, screenHeight / 2);

      // Perspective-correct tile grid lines on ceiling
      var player = state.player;
      var ceilingTileSize = 2;
      for (var scanlineRow = 0; scanlineRow < screenHeight / 2; scanlineRow++) {
        var scanlineDepth = screenHeight / (2 * (screenHeight / 2 - scanlineRow + 0.1));
        var worldXLeft = player.x + Math.cos(player.angle - CONFIG.fieldOfView / 2) * scanlineDepth;
        var worldYLeft = player.y + Math.sin(player.angle - CONFIG.fieldOfView / 2) * scanlineDepth;
        var worldXRight = player.x + Math.cos(player.angle + CONFIG.fieldOfView / 2) * scanlineDepth;
        var worldYRight = player.y + Math.sin(player.angle + CONFIG.fieldOfView / 2) * scanlineDepth;
        var fogBrightness = Math.max(0, 1 - scanlineDepth / CONFIG.maxRenderDepth);
        var gridLineAlpha = fogBrightness * 0.15;
        for (var pixelCol = 0; pixelCol < screenWidth; pixelCol += 4) {
          var interpolation = pixelCol / screenWidth;
          var worldX = worldXLeft + (worldXRight - worldXLeft) * interpolation;
          var worldY = worldYLeft + (worldYRight - worldYLeft) * interpolation;
          var isGridLineX = Math.abs(worldX % ceilingTileSize) < 0.06 || Math.abs(worldX % ceilingTileSize - ceilingTileSize) < 0.06;
          var isGridLineY = Math.abs(worldY % ceilingTileSize) < 0.06 || Math.abs(worldY % ceilingTileSize - ceilingTileSize) < 0.06;
          if (isGridLineX || isGridLineY) {
            ctx.fillStyle = 'rgba(20,20,20,' + gridLineAlpha + ')';
            ctx.fillRect(pixelCol, scanlineRow, 4, 1);
          }
        }
      }

      // Floor
      var floorGradient = ctx.createLinearGradient(0, screenHeight / 2, 0, screenHeight);
      floorGradient.addColorStop(0, '#111');
      floorGradient.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = floorGradient;
      ctx.fillRect(0, screenHeight / 2, screenWidth, screenHeight / 2);

      var player = state.player;
      var grid = state.grid;
      var enemy = state.enemy;
      var exitPos = state.exit;
      var halfFieldOfView = CONFIG.fieldOfView / 2;
      var stripWidth = screenWidth / CONFIG.rayCount;
      var zBuffer = [];

      for (var rayIndex = 0; rayIndex < CONFIG.rayCount; rayIndex++) {
        var rayAngle = player.angle - halfFieldOfView + (rayIndex / CONFIG.rayCount) * CONFIG.fieldOfView;
        var result = castRayDDA(player.x, player.y, rayAngle, grid);
        var correctedDist = result.dist * Math.cos(rayAngle - player.angle);
        zBuffer[rayIndex] = correctedDist;
        if (result.hit) {
          var wallHeight = (screenHeight / correctedDist) * 1.0;
          var wallTop = (screenHeight - wallHeight) / 2;
          var brightness = Math.max(0, 1 - correctedDist / CONFIG.maxRenderDepth);
          if (result.side === 1) brightness *= 0.7;
          ctx.fillStyle = 'rgb('+Math.floor(40*brightness)+','+Math.floor(80*brightness)+','+Math.floor(160*brightness)+')';
          ctx.fillRect(Math.floor(rayIndex * stripWidth), wallTop, Math.ceil(stripWidth) + 1, wallHeight);
          if (result.texX !== undefined) {
            var edgeDistance = Math.min(result.texX, 1 - result.texX);
            if (edgeDistance < 0.05) {
              var edgeBrightness = brightness * 0.3;
              ctx.fillStyle = 'rgba(' + Math.floor(20 * edgeBrightness) + ',' + Math.floor(40 * edgeBrightness) + ',' + Math.floor(100 * edgeBrightness) + ',0.5)';
              ctx.fillRect(Math.floor(rayIndex * stripWidth), wallTop, Math.ceil(stripWidth) + 1, wallHeight);
            }
            // Dense alternating >> << skip icon pattern on walls
            var texU = result.texX;
            var iconRows = 4; // number of icon rows per wall tile
            var patternSize = wallHeight / iconRows;
            if (patternSize > 5) {
              var skipAlpha = brightness * 0.1;
              var stripLeft = Math.floor(rayIndex * stripWidth);
              for (var row = 0; row < iconRows; row++) {
                var iconTop = wallTop + row * patternSize + patternSize * 0.1;
                var iconH = patternSize * 0.8;
                var iconCenterY = iconTop + iconH / 2;
                // Alternate direction each row: even=>> odd=<<
                var flipped = (row % 2 === 1);
                var adjustedTexU = flipped ? (1 - texU) : texU;
                // Two chevrons per cell: first at 0.1-0.4, second at 0.5-0.8
                for (var chevron = 0; chevron < 2; chevron++) {
                  var chevronLeft = 0.1 + chevron * 0.4;
                  var chevronRight = 0.4 + chevron * 0.4;
                  if (adjustedTexU >= chevronLeft && adjustedTexU <= chevronRight) {
                    var progress = (adjustedTexU - chevronLeft) / (chevronRight - chevronLeft);
                    var halfSpan = (1 - progress) * iconH / 2;
                    var stripTop = iconCenterY - halfSpan;
                    var stripBot = iconCenterY + halfSpan;
                    if (stripTop < wallTop) stripTop = wallTop;
                    if (stripBot > wallTop + wallHeight) stripBot = wallTop + wallHeight;
                    if (stripBot > stripTop) {
                      ctx.fillStyle = 'rgba(100,180,255,'+skipAlpha+')';
                      ctx.fillRect(stripLeft, stripTop, Math.ceil(stripWidth)+1, stripBot - stripTop);
                    }
                  }
                }
              }
            }
          }
        }
      }

      // Teleporters
      for (var portalIdx = 0; portalIdx < state.teleporters.length; portalIdx++) {
        var portal = state.teleporters[portalIdx];
        renderSprite(portal.x, portal.y, zBuffer, portal.color, 0.5, 'TELE');
      }

      // Exit
      renderSprite(exitPos.x, exitPos.y, zBuffer, '#0f0', 0.6, 'EXIT');

      // Enemy: cut a hole in the canvas so the parent video shows through
      if (enemy.active) {
        renderEnemyCutout(enemy, zBuffer);
      }
    }

    function renderEnemyCutout(enemy, zBuffer) {
      var screenWidth = canvas.width, screenHeight = canvas.height;
      var player = state.player;
      var deltaX = enemy.x - player.x, deltaY = enemy.y - player.y;
      var distanceToEnemy = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      if (distanceToEnemy < 0.1) return;

      var angleToEnemy = Math.atan2(deltaY, deltaX);
      var angleDifference = angleToEnemy - player.angle;
      while (angleDifference > Math.PI) angleDifference -= Math.PI * 2;
      while (angleDifference < -Math.PI) angleDifference += Math.PI * 2;
      if (Math.abs(angleDifference) > CONFIG.fieldOfView / 2 + 0.1) return;

      var enemyScreenX = screenWidth / 2 + (angleDifference / (CONFIG.fieldOfView / 2)) * (screenWidth / 2);
      var correctedDist = distanceToEnemy * Math.cos(angleDifference);
      var cutoutHeight = (screenHeight / correctedDist) * CONFIG.enemyDisplayScale;
      var cutoutWidth = cutoutHeight * (16 / 9);
      var cutoutTop = (screenHeight - cutoutHeight) / 2;

      var rayStripWidth = screenWidth / CONFIG.rayCount;
      var firstStrip = Math.max(0, Math.floor((enemyScreenX - cutoutWidth / 2) / rayStripWidth));
      var lastStrip = Math.min(CONFIG.rayCount - 1, Math.floor((enemyScreenX + cutoutWidth / 2) / rayStripWidth));

      // Per-strip occlusion check
      var anyVisible = false;
      for (var stripIdx = firstStrip; stripIdx <= lastStrip; stripIdx++) {
        if (zBuffer[stripIdx] > correctedDist) { anyVisible = true; break; }
      }
      if (!anyVisible) return;

      enemyScreenInfo = { x: enemyScreenX, y: cutoutTop, w: cutoutWidth, h: cutoutHeight, dist: correctedDist };

      // Draw a red glowing border
      var pulseIntensity = 0.6 + 0.4 * Math.sin(performance.now() / 200);
      ctx.save();
      ctx.globalAlpha = Math.max(0.3, 1 - correctedDist / 12) * pulseIntensity;
      ctx.shadowColor = '#f00';
      ctx.shadowBlur = 15 + pulseIntensity * 10;
      ctx.strokeStyle = '#f00';
      ctx.lineWidth = 3;

      // Build visible strip ranges for border and cutout
      function buildVisibleRects(callback) {
        var isInVisibleRange = false;
        var visibleRangeStart = 0;
        for (var stripIdx = firstStrip; stripIdx <= lastStrip + 1; stripIdx++) {
          var isVisible = (stripIdx <= lastStrip) && zBuffer[stripIdx] > correctedDist;
          if (isVisible && !isInVisibleRange) {
            visibleRangeStart = stripIdx * rayStripWidth;
            isInVisibleRange = true;
          } else if (!isVisible && isInVisibleRange) {
            var visibleRangeEnd = stripIdx * rayStripWidth;
            var clampedLeft = Math.max(enemyScreenX - cutoutWidth / 2, visibleRangeStart);
            var clampedRight = Math.min(enemyScreenX + cutoutWidth / 2, visibleRangeEnd);
            callback(clampedLeft, cutoutTop, clampedRight - clampedLeft, cutoutHeight);
            isInVisibleRange = false;
          }
        }
      }

      ctx.beginPath();
      buildVisibleRects(function(rectX, rectY, rectW, rectH) { ctx.rect(rectX, rectY, rectW, rectH); });
      ctx.stroke();
      ctx.restore();

      // Cut the hole using destination-out compositing
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      buildVisibleRects(function(rectX, rectY, rectW, rectH) { ctx.rect(rectX, rectY, rectW, rectH); });
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fill();
      ctx.restore();
    }

    function renderSprite(spriteX, spriteY, zBuffer, color, spriteScale, label) {
      var screenWidth = canvas.width, screenHeight = canvas.height;
      var player = state.player;
      var deltaX = spriteX - player.x, deltaY = spriteY - player.y;
      var distanceToSprite = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      if (distanceToSprite < 0.1) return;

      var angleToSprite = Math.atan2(deltaY, deltaX);
      var angleDifference = angleToSprite - player.angle;
      while (angleDifference > Math.PI) angleDifference -= Math.PI * 2;
      while (angleDifference < -Math.PI) angleDifference += Math.PI * 2;
      if (Math.abs(angleDifference) > CONFIG.fieldOfView / 2 + 0.1) return;

      var spriteScreenX = screenWidth / 2 + (angleDifference / (CONFIG.fieldOfView / 2)) * (screenWidth / 2);
      var correctedDist = distanceToSprite * Math.cos(angleDifference);
      var spriteHeight = (screenHeight / correctedDist) * spriteScale;
      var spriteWidth = spriteHeight * 0.8;
      var spriteScreenY = (screenHeight - spriteHeight) / 2;

      var rayStripWidth = screenWidth / CONFIG.rayCount;
      var firstStrip = Math.max(0, Math.floor((spriteScreenX - spriteWidth / 2) / rayStripWidth));
      var lastStrip = Math.min(CONFIG.rayCount - 1, Math.floor((spriteScreenX + spriteWidth / 2) / rayStripWidth));
      var isVisible = false;
      for (var stripIdx = firstStrip; stripIdx <= lastStrip; stripIdx++) {
        if (zBuffer[stripIdx] > correctedDist) { isVisible = true; break; }
      }
      if (!isVisible) return;

      ctx.save();
      ctx.globalAlpha = Math.max(0.2, 1 - correctedDist / 12);

      if (label === 'EXIT') {
        var exitPulse = 0.7 + 0.3 * Math.sin(performance.now() / 200);
        ctx.fillStyle = color;
        ctx.globalAlpha *= exitPulse;
        ctx.fillRect(spriteScreenX - spriteWidth / 2, spriteScreenY, spriteWidth, spriteHeight);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(spriteScreenX - spriteWidth / 2, spriteScreenY, spriteWidth, spriteHeight);
        ctx.fillStyle = '#fff';
        ctx.font = Math.max(10, spriteHeight / 4) + 'px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('SKIP', spriteScreenX, spriteScreenY + spriteHeight / 2 + 5);
      } else if (label === 'TELE') {
        var animTime = performance.now() / 400;
        var portalPulse = 0.6 + 0.4 * Math.sin(animTime * 2);
        var portalRadius = spriteWidth / 2;
        var spriteCenterY = spriteScreenY + spriteHeight / 2;
        var portalGlow = ctx.createRadialGradient(spriteScreenX, spriteCenterY, 0, spriteScreenX, spriteCenterY, portalRadius * 1.3);
        portalGlow.addColorStop(0, color);
        portalGlow.addColorStop(0.5, 'rgba(128,128,128,0.3)');
        portalGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = portalGlow;
        ctx.globalAlpha *= portalPulse;
        ctx.beginPath();
        ctx.arc(spriteScreenX, spriteCenterY, portalRadius * 1.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(1, portalRadius / 6);
        for (var segmentIdx = 0; segmentIdx < 4; segmentIdx++) {
          var segmentAngle = animTime + segmentIdx * Math.PI / 2;
          ctx.beginPath();
          ctx.arc(spriteScreenX, spriteCenterY, portalRadius * 0.7, segmentAngle, segmentAngle + Math.PI / 4);
          ctx.stroke();
        }
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(spriteScreenX, spriteCenterY, portalRadius / 5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ============================================================
    // MINIMAP
    // Top-down debug view showing walls, player position/direction,
    // enemy position, exit, and teleporters. Only rendered when
    // debug mode is active (Cmd/Ctrl + Shift + Click to start).
    // ============================================================
    function renderMinimap() {
      if (!debugMode) return;
      var grid = state.grid, gridWidth = state.gridW, gridHeight = state.gridH;
      var player = state.player, enemy = state.enemy, exitPos = state.exit;
      var mapWidth = minimapCanvas.width, mapHeight = minimapCanvas.height;
      var cellWidth = mapWidth / gridWidth, cellHeight = mapHeight / gridHeight;
      minimapCtx.fillStyle = '#000';
      minimapCtx.fillRect(0, 0, mapWidth, mapHeight);
      for (var tileY = 0; tileY < gridHeight; tileY++) {
        for (var tileX = 0; tileX < gridWidth; tileX++) {
          if (grid[tileY][tileX] === 1) {
            minimapCtx.fillStyle = '#224';
            minimapCtx.fillRect(tileX * cellWidth, tileY * cellHeight, cellWidth + 0.5, cellHeight + 0.5);
          }
        }
      }
      minimapCtx.fillStyle = '#0f0';
      minimapCtx.fillRect((exitPos.x - 0.3) * cellWidth, (exitPos.y - 0.3) * cellHeight, cellWidth * 0.6, cellHeight * 0.6);
      for (var portalIdx = 0; portalIdx < state.teleporters.length; portalIdx++) {
        var portal = state.teleporters[portalIdx];
        minimapCtx.fillStyle = portal.color;
        minimapCtx.globalAlpha = 0.6 + 0.4 * Math.sin(performance.now() / 300);
        minimapCtx.beginPath();
        minimapCtx.arc(portal.x * cellWidth, portal.y * cellHeight, 3, 0, Math.PI * 2);
        minimapCtx.fill();
        minimapCtx.globalAlpha = 1;
      }
      if (enemy.active) {
        minimapCtx.fillStyle = '#f00';
        minimapCtx.beginPath();
        minimapCtx.arc(enemy.x * cellWidth, enemy.y * cellHeight, 3, 0, Math.PI * 2);
        minimapCtx.fill();
      }
      minimapCtx.fillStyle = '#ff0';
      minimapCtx.beginPath();
      minimapCtx.arc(player.x * cellWidth, player.y * cellHeight, 3, 0, Math.PI * 2);
      minimapCtx.fill();
      minimapCtx.strokeStyle = '#ff0';
      minimapCtx.lineWidth = 1;
      minimapCtx.beginPath();
      minimapCtx.moveTo(player.x * cellWidth, player.y * cellHeight);
      minimapCtx.lineTo((player.x + Math.cos(player.angle) * 1.5) * cellWidth, (player.y + Math.sin(player.angle) * 1.5) * cellHeight);
      minimapCtx.stroke();
    }

    // ============================================================
    // ENEMY AI
    // Uses BFS pathfinding to chase the player. When close (<5
    // tiles), targets a point in front of the player's face to
    // block their view. Speed varies: slower on corners, faster
    // on long straights. Acts as a wall - pushes the player back
    // on contact without clipping them into walls.
    // ============================================================
    function updateEnemy(deltaTime) {
      var enemy = state.enemy, player = state.player, grid = state.grid;
      if (!enemy.active) {
        if (state.elapsed > CONFIG.enemyActivationDelay) enemy.active = true;
        return;
      }

      // Recalculate path to player periodically
      enemy.pathRecalcTimer -= deltaTime;
      if (enemy.pathRecalcTimer <= 0 || enemy.path.length === 0) {
        var distanceToPlayer = Math.sqrt(Math.pow(enemy.x - player.x, 2) + Math.pow(enemy.y - player.y, 2));
        var targetX = player.x, targetY = player.y;

        // When close, target a point in front of the player's face to block their view
        if (distanceToPlayer < 5) {
          var frontOffset = Math.min(distanceToPlayer * 0.4, 1.0);
          var frontX = player.x + Math.cos(player.angle) * frontOffset;
          var frontY = player.y + Math.sin(player.angle) * frontOffset;
          var frontTileX = Math.floor(frontX), frontTileY = Math.floor(frontY);
          if (frontTileX >= 0 && frontTileX < grid[0].length && frontTileY >= 0 && frontTileY < grid.length && grid[frontTileY][frontTileX] === 0) {
            targetX = frontX;
            targetY = frontY;
          }
        }
        enemy.path = findPath(grid, enemy.x, enemy.y, targetX, targetY);
        enemy.pathIndex = 0;
        enemy.pathRecalcTimer = 0.5;
      }

      // Follow the path - faster on straights, slower on corners
      if (enemy.path.length > 0 && enemy.pathIndex < enemy.path.length) {
        var waypoint = enemy.path[enemy.pathIndex];
        var deltaX = waypoint.x - enemy.x, deltaY = waypoint.y - enemy.y;
        var distanceToWaypoint = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        if (distanceToWaypoint < 0.15) {
          enemy.pathIndex++;
        } else {
          // Count consecutive nodes ahead in the same direction
          var straightSegments = 1;
          var remainingPath = enemy.path.slice(enemy.pathIndex);
          for (var pathIdx = 0; pathIdx < remainingPath.length - 1; pathIdx++) {
            var segDirX = remainingPath[pathIdx + 1].x - remainingPath[pathIdx].x;
            var segDirY = remainingPath[pathIdx + 1].y - remainingPath[pathIdx].y;
            var prevDirX = pathIdx === 0 ? (remainingPath[0].x - enemy.x) : (remainingPath[pathIdx].x - remainingPath[pathIdx - 1].x);
            var prevDirY = pathIdx === 0 ? (remainingPath[0].y - enemy.y) : (remainingPath[pathIdx].y - remainingPath[pathIdx - 1].y);
            var segLength = Math.sqrt(segDirX * segDirX + segDirY * segDirY);
            var prevLength = Math.sqrt(prevDirX * prevDirX + prevDirY * prevDirY);
            if (segLength > 0.01 && prevLength > 0.01 &&
                (segDirX * prevDirX + segDirY * prevDirY) / (segLength * prevLength) > 0.9) {
              straightSegments++;
            } else {
              break;
            }
          }
          var speedMultiplier = 0.6 + Math.min(straightSegments - 1, 4) * 0.4;
          var moveSpeed = CONFIG.enemyMoveSpeed * speedMultiplier * deltaTime;
          enemy.x += (deltaX / distanceToWaypoint) * moveSpeed;
          enemy.y += (deltaY / distanceToWaypoint) * moveSpeed;
        }
      }
      // Enemy contact: either fail the ad or push the player back
      var contactDeltaX = enemy.x - player.x, contactDeltaY = enemy.y - player.y;
      var contactDistance = Math.sqrt(contactDeltaX * contactDeltaX + contactDeltaY * contactDeltaY);
      var blockRadius = 0.5;
      var collisionMargin = 0.15;
      if (contactDistance < blockRadius && contactDistance > 0.001) {
        if (ENEMY_CONTACT_FAILS) {
          state.running = false;
          sendToShell({ type: 'setVideoFilter', value: 'none' });
          sendToShell({ type: 'setPlaybackRate', value: 1 });
          window.top.postMessage({ type: 'fail' }, '*');
          return;
        }
        var pushDistance = blockRadius - contactDistance;
        var pushX = -(contactDeltaX / contactDistance) * pushDistance;
        var pushY = -(contactDeltaY / contactDistance) * pushDistance;
        var newPlayerX = player.x + pushX;
        if (!isWall(grid,newPlayerX+collisionMargin,player.y) && !isWall(grid,newPlayerX-collisionMargin,player.y) &&
            !isWall(grid,newPlayerX+collisionMargin,player.y+collisionMargin) && !isWall(grid,newPlayerX-collisionMargin,player.y-collisionMargin))
          player.x = newPlayerX;
        var newPlayerY = player.y + pushY;
        if (!isWall(grid,player.x,newPlayerY+collisionMargin) && !isWall(grid,player.x,newPlayerY-collisionMargin) &&
            !isWall(grid,player.x+collisionMargin,newPlayerY+collisionMargin) && !isWall(grid,player.x-collisionMargin,newPlayerY-collisionMargin))
          player.y = newPlayerY;
      }
    }

    // ============================================================
    // PLAYER MOVEMENT
    // WASD/Arrow key movement with wall-sliding collision.
    // Q/E for strafing. Checks teleporter proximity for warping
    // between linked portals (with cooldown). Triggers win state
    // when the player reaches the exit marker.
    // ============================================================
    function updatePlayer(deltaTime) {
      var player = state.player;
      var grid = state.grid;
      var keys = state.keys;
      var moveDeltaX = 0;
      var moveDeltaY = 0;
      var facingCos = Math.cos(player.angle);
      var facingSin = Math.sin(player.angle);
      var speed = CONFIG.playerMoveSpeed * deltaTime;

      // Forward/backward
      if (keys['w'] || keys['arrowup']) { moveDeltaX += facingCos * speed; moveDeltaY += facingSin * speed; }
      if (keys['s'] || keys['arrowdown']) { moveDeltaX -= facingCos * speed; moveDeltaY -= facingSin * speed; }

      // Strafe left/right
      if (keys['q']) { moveDeltaX += Math.cos(player.angle - Math.PI / 2) * speed; moveDeltaY += Math.sin(player.angle - Math.PI / 2) * speed; }
      if (keys['e']) { moveDeltaX += Math.cos(player.angle + Math.PI / 2) * speed; moveDeltaY += Math.sin(player.angle + Math.PI / 2) * speed; }

      // Rotation
      if (keys['a'] || keys['arrowleft']) player.angle -= CONFIG.playerTurnSpeed * deltaTime;
      if (keys['d'] || keys['arrowright']) player.angle += CONFIG.playerTurnSpeed * deltaTime;
      while (player.angle > Math.PI * 2) player.angle -= Math.PI * 2;
      while (player.angle < 0) player.angle += Math.PI * 2;

      // Wall-sliding collision (try each axis independently)
      var wallMargin = 0.15;
      var newPlayerX = player.x + moveDeltaX;
      if (!isWall(grid, newPlayerX + wallMargin, player.y) && !isWall(grid, newPlayerX - wallMargin, player.y) &&
          !isWall(grid, newPlayerX + wallMargin, player.y + wallMargin) && !isWall(grid, newPlayerX - wallMargin, player.y - wallMargin) &&
          !isWall(grid, newPlayerX + wallMargin, player.y - wallMargin) && !isWall(grid, newPlayerX - wallMargin, player.y + wallMargin))
        player.x = newPlayerX;

      var newPlayerY = player.y + moveDeltaY;
      if (!isWall(grid, player.x, newPlayerY + wallMargin) && !isWall(grid, player.x, newPlayerY - wallMargin) &&
          !isWall(grid, player.x + wallMargin, newPlayerY + wallMargin) && !isWall(grid, player.x - wallMargin, newPlayerY - wallMargin) &&
          !isWall(grid, player.x + wallMargin, newPlayerY - wallMargin) && !isWall(grid, player.x - wallMargin, newPlayerY + wallMargin))
        player.y = newPlayerY;

      // Teleporter check
      if (state.teleportCooldown > 0) state.teleportCooldown -= deltaTime;
      if (state.teleportCooldown <= 0) {
        for (var portalIdx = 0; portalIdx < state.teleporters.length; portalIdx++) {
          var portal = state.teleporters[portalIdx];
          var portalDeltaX = player.x - portal.x, portalDeltaY = player.y - portal.y;
          if (Math.sqrt(portalDeltaX * portalDeltaX + portalDeltaY * portalDeltaY) < 0.45) {
            var destination = state.teleporters[portal.pairIdx];
            player.x = destination.x;
            player.y = destination.y;
            state.teleportCooldown = 1.5;
            playTeleportSfx();
            break;
          }
        }
      }

      // Check if player reached the exit
      var exitDeltaX = player.x - state.exit.x, exitDeltaY = player.y - state.exit.y;
      if (Math.sqrt(exitDeltaX * exitDeltaX + exitDeltaY * exitDeltaY) < 0.5) {
        state.won = true;
        state.running = false;
      }
    }

    function isWall(grid, worldX, worldY) {
      var tileX = Math.floor(worldX), tileY = Math.floor(worldY);
      if (tileY < 0 || tileY >= grid.length || tileX < 0 || tileX >= grid[0].length) return true;
      return grid[tileY][tileX] === 1;
    }

    // ============================================================
    // AUDIO
    // Teleport sound effect generated via Web Audio API (no
    // external files). Enemy audio is handled by adjusting the
    // parent shell's video volume based on enemy proximity.
    // ============================================================
    var audioContext = null;
    var teleportSoundBuffer = null;

    function initAudio() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      audioContext.resume();
      var sampleRate = audioContext.sampleRate;
      var bufferLength = Math.floor(sampleRate * 0.4);
      teleportSoundBuffer = audioContext.createBuffer(1, bufferLength, sampleRate);
      var samples = teleportSoundBuffer.getChannelData(0);
      for (var sampleIdx = 0; sampleIdx < bufferLength; sampleIdx++) {
        var sampleTime = sampleIdx / sampleRate;
        var sweepFreq = 800 - sampleTime * 1500;
        var envelope = Math.max(0, 1 - sampleTime / 0.4);
        samples[sampleIdx] = Math.sin(2 * Math.PI * sweepFreq * sampleTime) * envelope * 0.4;
      }
    }

    function playTeleportSfx() {
      if (!audioContext || !teleportSoundBuffer) return;
      var sourceNode = audioContext.createBufferSource();
      sourceNode.buffer = teleportSoundBuffer;
      sourceNode.connect(audioContext.destination);
      sourceNode.start();
    }

    function updateAudio() {
      if (!state || !state.running || !state.enemy.active) {
        sendToShell({ type: 'setVolume', value: VOLUME_MINIMUM });
        return;
      }
      var player = state.player, enemy = state.enemy;
      var deltaX = enemy.x - player.x, deltaY = enemy.y - player.y;
      var distanceToEnemy = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      var proximity = Math.max(0, 1 - distanceToEnemy / VOLUME_HEARING_RANGE);
      var volumeCurve = Math.pow(proximity, VOLUME_FALLOFF_CURVE);
      var volume = VOLUME_MINIMUM + volumeCurve * (VOLUME_MAXIMUM - VOLUME_MINIMUM);
      sendToShell({ type: 'setVolume', value: volume });
    }

    // ============================================================
    // VIDEO EFFECTS
    // Manipulates the parent shell's video via postMessage as the
    // enemy gets closer: playback slows down and CSS filters
    // (hue-rotate, saturate, brightness) create a glitch effect.
    // Resets to normal when the enemy is far away or on win.
    // ============================================================
    function updateVideoEffects() {
      if (!state || !state.running) return;
      var enemy = state.enemy, player = state.player;
      if (!enemy.active) {
        sendToShell({ type: 'setVideoFilter', value: 'none' });
        return;
      }
      var deltaX = enemy.x - player.x, deltaY = enemy.y - player.y;
      var distanceToEnemy = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      var proximity = Math.max(0, 1 - distanceToEnemy / 8);

      // Slow down video as enemy gets closer
      sendToShell({ type: 'setPlaybackRate', value: Math.max(0.2, 1.0 - proximity * 0.8) });

      sendToShell({ type: 'setVideoFilter', value: 'none' });
    }

    // ============================================================
    // HUD
    // Shows controls hint, elapsed time, and a flashing "AD
    // BLOCKING YOUR PATH" warning when the enemy is within 3
    // tiles. Skip distance is only shown in debug mode.
    // ============================================================
    function updateHUD() {
      if (!state || !state.running) return;
      var enemy = state.enemy, player = state.player, exitPosition = state.exit;

      var distanceToExit = Math.sqrt(
        (exitPosition.x - player.x) * (exitPosition.x - player.x) +
        (exitPosition.y - player.y) * (exitPosition.y - player.y)
      );
      var distanceToEnemy = Math.sqrt(
        (enemy.x - player.x) * (enemy.x - player.x) +
        (enemy.y - player.y) * (enemy.y - player.y)
      );

      var warning = '';
      if (enemy.active && distanceToEnemy < 3) {
        var warningOpacity = 0.5 + 0.5 * Math.sin(performance.now() / 500);
        warning = '<span style="color:#f00;font-size:14px;opacity:' + warningOpacity.toFixed(2) + '">AD IS CLOSING IN</span><br>';
      }

      var hudText = '';
      if (!isTouchDevice) {
        hudText += '<span style="color:#aaa;font-size:11px">WASD/Arrows: move | Q/E: strafe</span><br>';
      }
      if (debugMode) {
        hudText += '<span style="color:#0f0">Skip: ' + distanceToExit.toFixed(1) + 'm</span> | ';
      }
      hudText += '<span style="color:#f88">Time: ' + state.elapsed.toFixed(1) + 's</span>';
      hud.innerHTML = warning + hudText;

      // On mobile, show time below the controls
      if (isTouchDevice && mobileTimeDisplay) {
        mobileTimeDisplay.innerHTML = '<span style="color:#f88">Time: ' + state.elapsed.toFixed(1) + 's</span>';
      }
    }

    // ============================================================
    // GAME LOOP
    // Runs every frame via requestAnimationFrame. Updates player,
    // enemy, audio, and video effects when running. On win,
    // resets video filters and sends adSuccess to the shell.
    // ============================================================
    var lastFrameTime = 0;

    function gameLoop(timestamp) {
      var deltaTime = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
      lastFrameTime = timestamp;
      if (state && state.running) {
        state.elapsed += deltaTime;
        updatePlayer(deltaTime);
        updateEnemy(deltaTime);
        updateAudio();
        updateVideoEffects();
      }
      if (state) {
        render();
        renderMinimap();
        updateHUD();
      }
      if (state && state.won && !state.endShown) {
        state.endShown = true;
        sendToShell({ type: 'setVideoFilter', value: 'none' });
        sendToShell({ type: 'setPlaybackRate', value: 1 });
        adSuccess();
      }
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // INPUT
    // Keyboard handlers for movement. Prevents default on arrow
    // keys to stop page scrolling.
    // ============================================================
    window.addEventListener('keydown', function(e) {
      if (!state) return;
      state.keys[e.key.toLowerCase()] = true;
      if (['arrowup','arrowdown','arrowleft','arrowright'].indexOf(e.key.toLowerCase()) !== -1) e.preventDefault();
    });
    window.addEventListener('keyup', function(e) {
      if (!state) return;
      state.keys[e.key.toLowerCase()] = false;
    });

    // ============================================================
    // MOBILE TOUCH CONTROLS
    // Maps touch events on on-screen buttons to the same key state
    // used by keyboard input. Supports multi-touch so you can hold
    // forward while turning. Only visible on touch devices via CSS.
    // ============================================================
    var touchButtons = document.querySelectorAll('.touch-btn');
    var activeTouches = {};

    function handleTouchStart(event) {
      event.preventDefault();
      for (var touchIdx = 0; touchIdx < event.changedTouches.length; touchIdx++) {
        var touch = event.changedTouches[touchIdx];
        var button = document.elementFromPoint(touch.clientX, touch.clientY);
        if (button && button.dataset && button.dataset.key && state) {
          activeTouches[touch.identifier] = button.dataset.key;
          state.keys[button.dataset.key] = true;
          button.classList.add('active');
        }
      }
    }

    function handleTouchEnd(event) {
      event.preventDefault();
      for (var touchIdx = 0; touchIdx < event.changedTouches.length; touchIdx++) {
        var touch = event.changedTouches[touchIdx];
        var mappedKey = activeTouches[touch.identifier];
        if (mappedKey && state) {
          state.keys[mappedKey] = false;
          // Remove active class from the button with this key
          for (var btnIdx = 0; btnIdx < touchButtons.length; btnIdx++) {
            if (touchButtons[btnIdx].dataset.key === mappedKey) {
              touchButtons[btnIdx].classList.remove('active');
            }
          }
          delete activeTouches[touch.identifier];
        }
      }
    }

    function handleTouchMove(event) {
      event.preventDefault();
      for (var touchIdx = 0; touchIdx < event.changedTouches.length; touchIdx++) {
        var touch = event.changedTouches[touchIdx];
        var currentButton = document.elementFromPoint(touch.clientX, touch.clientY);
        var previousKey = activeTouches[touch.identifier];
        var currentKey = (currentButton && currentButton.dataset) ? currentButton.dataset.key : null;

        if (previousKey !== currentKey) {
          // Release old button
          if (previousKey && state) {
            state.keys[previousKey] = false;
            for (var btnIdx = 0; btnIdx < touchButtons.length; btnIdx++) {
              if (touchButtons[btnIdx].dataset.key === previousKey) {
                touchButtons[btnIdx].classList.remove('active');
              }
            }
          }
          // Press new button
          if (currentKey && state) {
            activeTouches[touch.identifier] = currentKey;
            state.keys[currentKey] = true;
            currentButton.classList.add('active');
          } else {
            delete activeTouches[touch.identifier];
          }
        }
      }
    }

    document.getElementById('touch-controls').addEventListener('touchstart', handleTouchStart, { passive: false });
    document.getElementById('touch-controls').addEventListener('touchend', handleTouchEnd, { passive: false });
    document.getElementById('touch-controls').addEventListener('touchcancel', handleTouchEnd, { passive: false });
    document.getElementById('touch-controls').addEventListener('touchmove', handleTouchMove, { passive: false });

    // ============================================================
    // PAUSE ON FOCUS LOSS
    // Pauses the game and the parent video when the iframe loses
    // focus or the mouse leaves the game area. Shows a "PAUSED"
    // overlay. Click inside to resume.
    // ============================================================
    var paused = false;
    var wasRunning = false;

    function pauseGame() {
      if (!state || !state.running || paused) return;
      paused = true;
      wasRunning = true;
      state.running = false;
      state.keys = {};
      // Only pause the parent video on desktop — mobile needs it to keep playing
      if (!isTouchDevice) {
        sendToShell({ type: 'pause' });
      }
      gameOverlay.classList.remove('hidden');
      gameOverlay.innerHTML = '<h1 style="font-size:28px">PAUSED</h1><div class="sub">' +
        (isTouchDevice ? 'Tap to resume' : 'Click to resume') + '</div>';
    }

    function resumeGame() {
      if (!paused || !wasRunning) return;
      paused = false;
      wasRunning = false;
      state.running = true;
      if (!isTouchDevice) {
        sendToShell({ type: 'play' });
      }
      gameOverlay.classList.add('hidden');
    }

    // Only pause on focus loss / mouse leave on desktop
    if (!isTouchDevice) {
      window.addEventListener('blur', pauseGame);
      document.addEventListener('mouseleave', pauseGame);
    }

    // ============================================================
    // SHELL MESSAGES
    // Listens for postMessage events from the parent game shell.
    // 'adStarted' triggers the click-to-start flow.
    // 'adFinished' calls fail if the player hasn't escaped yet.
    // ============================================================
    var adReady = false;

    function startMaze() {
      if (state && state.running) return;
      initGame();
      state.running = true;
      state.startTime = performance.now();
      gameOverlay.classList.add('hidden');
      if (!audioContext) initAudio();
      else audioContext.resume();
    }

    var debugMode = false;

    // Require click/tap inside the iframe to start
    // Cmd/Ctrl + Shift + Click = debug mode (desktop only)
    function handleStartInteraction(event) {
      if (!adReady) return;
      if (!state || !state.running) {
        debugMode = event.metaKey && event.shiftKey;
        minimapCanvas.style.display = debugMode ? 'block' : 'none';
      }
      startMaze();
    }

    document.addEventListener('click', function(event) {
      if (paused) { resumeGame(); return; }
      handleStartInteraction(event);
    });

    // Touch support for starting/resuming on mobile
    gameOverlay.addEventListener('touchstart', function(event) {
      event.preventDefault();
      if (paused) { resumeGame(); return; }
      handleStartInteraction(event);
    }, { passive: false });

    window.addEventListener('message', function(event) {
      if (!event.data || !event.data.type) return;
      if (event.data.type === 'adStarted') {
        adReady = true;
        gameOverlay.querySelector('h1').textContent = 'Looking to skip the ad?';
        gameOverlay.querySelector('.sub').textContent = 'Click to begin navigating to the skip.';
      }
      if (event.data.type === 'adFinished') {
        if (state && !state.won) {
          window.top.postMessage({ type: 'fail' }, '*');
        }
      }
    });

    // ============================================================
    // INIT
    // Pre-generate a maze so it's ready when the player clicks,
    // and kick off the render loop.
    // ============================================================
    initGame();
    requestAnimationFrame(gameLoop);

  })(window, document);
  </script>
</body>
</html>
