<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Maze Runner Ad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style type="text/css">
    html, body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #overlay-container {
      width: 640px;
      height: 480px;
      position: relative;
    }
    #gameCanvas {
      display: block;
      width: 640px;
      height: 480px;
    }
    #minimap {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid rgba(0,255,0,0.5);
      background: rgba(0,0,0,0.6);
      display: none;
    }
    #hud {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 4px #000;
    }
    #game-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 18px;
      z-index: 10;
    }
    #game-overlay.hidden { display: none; }
    #game-overlay h1 { font-size: 36px; margin: 0 0 6px 0; }
    #game-overlay .sub { font-size: 13px; color: #aaa; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div id="overlay-container">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <canvas id="minimap" width="140" height="140"></canvas>
    <div id="hud"></div>
    <div id="game-overlay">
      <h1>Looking to skip the ad?</h1>
      <div class="sub">Click to begin navigating to the skip.</div>
      <div class="sub" style="margin-top:10px;font-size:11px;color:#666">Navigate the maze to skip. WASD / Arrows to move, Q/E strafe</div>
    </div>
  </div>

  <script type="text/javascript">
  (function(window, document) {

    function adSuccess() {
      window.top.postMessage({ type: 'success' }, '*');
    }

    function shellMsg(msg) {
      window.top.postMessage(msg, '*');
    }

    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');
    var minimapCanvas = document.getElementById('minimap');
    var minimapCtx = minimapCanvas.getContext('2d');
    var hud = document.getElementById('hud');
    var gameOverlay = document.getElementById('game-overlay');

    var CFG = {
      fov: Math.PI / 3,
      rayCount: 320,
      maxDepth: 20,
      moveSpeed: 2.5,
      rotSpeed: 2.2,
      enemySpeed: 1.4,
      enemySpawnDelay: 3,
    };

    // ============================================================
    // MAZE GENERATION (Recursive Backtracker)
    // ============================================================
    function generateMaze(cols, rows) {
      var cells = [];
      for (var y = 0; y < rows; y++) {
        for (var x = 0; x < cols; x++) {
          cells.push({ x: x, y: y, walls: [true, true, true, true], visited: false });
        }
      }
      var getCell = function(x, y) {
        if (x < 0 || x >= cols || y < 0 || y >= rows) return null;
        return cells[y * cols + x];
      };
      var stack = [];
      var start = getCell(0, 0);
      start.visited = true;
      stack.push(start);
      while (stack.length > 0) {
        var current = stack[stack.length - 1];
        var neighbors = [
          { cell: getCell(current.x, current.y - 1), dir: 0 },
          { cell: getCell(current.x + 1, current.y), dir: 1 },
          { cell: getCell(current.x, current.y + 1), dir: 2 },
          { cell: getCell(current.x - 1, current.y), dir: 3 },
        ].filter(function(n) { return n.cell && !n.cell.visited; });
        if (neighbors.length === 0) {
          stack.pop();
        } else {
          var chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
          current.walls[chosen.dir] = false;
          chosen.cell.walls[(chosen.dir + 2) % 4] = false;
          chosen.cell.visited = true;
          stack.push(chosen.cell);
        }
      }
      var gridW = cols * 2 + 1;
      var gridH = rows * 2 + 1;
      var grid = [];
      for (var y = 0; y < gridH; y++) {
        grid[y] = [];
        for (var x = 0; x < gridW; x++) grid[y][x] = 1;
      }
      for (var y = 0; y < rows; y++) {
        for (var x = 0; x < cols; x++) {
          var cell = getCell(x, y);
          var gx = x * 2 + 1, gy = y * 2 + 1;
          grid[gy][gx] = 0;
          if (!cell.walls[0]) grid[gy - 1][gx] = 0;
          if (!cell.walls[1]) grid[gy][gx + 1] = 0;
          if (!cell.walls[2]) grid[gy + 1][gx] = 0;
          if (!cell.walls[3]) grid[gy][gx - 1] = 0;
        }
      }
      // Break walls to create loops
      var breakable = [];
      for (var y = 1; y < gridH - 1; y++) {
        for (var x = 1; x < gridW - 1; x++) {
          if (grid[y][x] !== 1) continue;
          if (grid[y][x-1] === 0 && grid[y][x+1] === 0 && grid[y-1][x] === 1 && grid[y+1][x] === 1)
            breakable.push({ x: x, y: y });
          if (grid[y-1][x] === 0 && grid[y+1][x] === 0 && grid[y][x-1] === 1 && grid[y][x+1] === 1)
            breakable.push({ x: x, y: y });
        }
      }
      for (var i = breakable.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = breakable[i]; breakable[i] = breakable[j]; breakable[j] = tmp;
      }
      var removeCount = Math.floor(breakable.length * 0.35);
      for (var i = 0; i < removeCount; i++) grid[breakable[i].y][breakable[i].x] = 0;

      // Break long edge corridors
      var canSolve = function() {
        var vis = {};
        var st = ['1,1']; vis['1,1'] = true;
        var target = (gridW-2)+','+(gridH-2);
        while (st.length > 0) {
          var key = st.pop();
          if (key === target) return true;
          var p = key.split(','); var cx = +p[0], cy = +p[1];
          var dd = [[0,-1],[1,0],[0,1],[-1,0]];
          for (var d = 0; d < dd.length; d++) {
            var nx = cx+dd[d][0], ny = cy+dd[d][1], nk = nx+','+ny;
            if (nx >= 0 && nx < gridW && ny >= 0 && ny < gridH && grid[ny][nx] === 0 && !vis[nk]) {
              vis[nk] = true; st.push(nk);
            }
          }
        }
        return false;
      };
      var edgeMargin = 2, maxRun = 3, candidates = [];
      for (var y = 1; y < gridH - 1; y++) {
        if (y > edgeMargin && y < gridH-1-edgeMargin) continue;
        var rs = -1;
        for (var x = 1; x <= gridW; x++) {
          var open = x < gridW && grid[y][x] === 0;
          if (open && rs === -1) rs = x;
          else if (!open && rs !== -1) {
            if (x - rs > maxRun) candidates.push({ x: Math.floor((rs+x-1)/2), y: y });
            rs = -1;
          }
        }
      }
      for (var x = 1; x < gridW - 1; x++) {
        if (x > edgeMargin && x < gridW-1-edgeMargin) continue;
        var rs = -1;
        for (var y = 1; y <= gridH; y++) {
          var open = y < gridH && grid[y][x] === 0;
          if (open && rs === -1) rs = y;
          else if (!open && rs !== -1) {
            if (y - rs > maxRun) candidates.push({ x: x, y: Math.floor((rs+y-1)/2) });
            rs = -1;
          }
        }
      }
      for (var i = 0; i < candidates.length; i++) {
        var c = candidates[i];
        if (grid[c.y][c.x] !== 0) continue;
        grid[c.y][c.x] = 1;
        if (!canSolve()) grid[c.y][c.x] = 0;
      }
      return { grid: grid, gridW: gridW, gridH: gridH };
    }

    // ============================================================
    // GAME STATE
    // ============================================================
    var state = null;

    function initGame() {
      var maze = generateMaze(10, 10);
      var grid = maze.grid, gridW = maze.gridW, gridH = maze.gridH;

      var spawnDirs = [
        { dx: 1, dy: 0, angle: 0 },
        { dx: 0, dy: 1, angle: Math.PI / 2 },
        { dx: -1, dy: 0, angle: Math.PI },
        { dx: 0, dy: -1, angle: -Math.PI / 2 },
      ];
      var spawnAngle = 0;
      for (var i = 0; i < spawnDirs.length; i++) {
        var d = spawnDirs[i];
        var cx = Math.floor(1.5 + d.dx), cy = Math.floor(1.5 + d.dy);
        if (cy >= 0 && cy < gridH && cx >= 0 && cx < gridW && grid[cy][cx] === 0) {
          spawnAngle = d.angle; break;
        }
      }

      var exit = { x: gridW - 1.5, y: gridH - 1.5 };
      grid[gridH - 2][gridW - 2] = 0;

      // Enemy: reachable, far from player
      var reachable = [];
      var vis = {}; var fl = ['1,1']; vis['1,1'] = true;
      while (fl.length > 0) {
        var key = fl.pop(); var p = key.split(','); var cx = +p[0], cy = +p[1];
        reachable.push({ x: cx, y: cy });
        var dd = [[0,-1],[1,0],[0,1],[-1,0]];
        for (var d = 0; d < dd.length; d++) {
          var nx = cx+dd[d][0], ny = cy+dd[d][1], nk = nx+','+ny;
          if (nx >= 0 && nx < gridW && ny >= 0 && ny < gridH && grid[ny][nx] === 0 && !vis[nk]) {
            vis[nk] = true; fl.push(nk);
          }
        }
      }
      reachable.sort(function(a, b) {
        return ((b.x-1)*(b.x-1)+(b.y-1)*(b.y-1)) - ((a.x-1)*(a.x-1)+(a.y-1)*(a.y-1));
      });
      var farPool = reachable.slice(0, Math.max(1, Math.floor(reachable.length / 4)));
      var ec = farPool[Math.floor(Math.random() * farPool.length)];

      var teleporters = [
        { x: gridW - 1.5, y: 1.5, pairIdx: 1, color: '#f0f' },
        { x: 1.5, y: gridH - 1.5, pairIdx: 0, color: '#0ff' },
      ];
      grid[1][gridW - 2] = 0;
      grid[gridH - 2][1] = 0;

      state = {
        grid: grid, gridW: gridW, gridH: gridH,
        player: { x: 1.5, y: 1.5, angle: spawnAngle },
        enemy: { x: ec.x + 0.5, y: ec.y + 0.5, active: false, path: [], pathIndex: 0, pathRecalcTimer: 0 },
        exit: exit, teleporters: teleporters, teleportCooldown: 0,
        running: false, won: false, startTime: 0, elapsed: 0, keys: {},
      };
    }

    // ============================================================
    // BFS PATHFINDING
    // ============================================================
    function bfs(grid, sx, sy, ex, ey) {
      var startX = Math.floor(sx), startY = Math.floor(sy);
      var endX = Math.floor(ex), endY = Math.floor(ey);
      if (startX === endX && startY === endY) return [];
      var rows = grid.length, cols = grid[0].length;
      var vis = {}; var queue = [{ x: startX, y: startY, path: [] }];
      vis[startX+','+startY] = true;
      var dirs = [[0,-1],[1,0],[0,1],[-1,0]];
      while (queue.length > 0) {
        var cur = queue.shift();
        for (var d = 0; d < dirs.length; d++) {
          var nx = cur.x+dirs[d][0], ny = cur.y+dirs[d][1], key = nx+','+ny;
          if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
          if (grid[ny][nx] === 1 || vis[key]) continue;
          vis[key] = true;
          var np = cur.path.concat([{ x: nx + 0.5, y: ny + 0.5 }]);
          if (nx === endX && ny === endY) return np;
          queue.push({ x: nx, y: ny, path: np });
        }
      }
      return [];
    }

    // ============================================================
    // DDA RAYCASTING
    // ============================================================
    function castRayDDA(px, py, angle, grid) {
      var dirX = Math.cos(angle), dirY = Math.sin(angle);
      var mapX = Math.floor(px), mapY = Math.floor(py);
      var ddX = Math.abs(1/dirX), ddY = Math.abs(1/dirY);
      var stepX, stepY, sdX, sdY;
      if (dirX < 0) { stepX = -1; sdX = (px-mapX)*ddX; }
      else { stepX = 1; sdX = (mapX+1-px)*ddX; }
      if (dirY < 0) { stepY = -1; sdY = (py-mapY)*ddY; }
      else { stepY = 1; sdY = (mapY+1-py)*ddY; }
      var cmX = mapX, cmY = mapY, side = 0;
      for (var i = 0; i < 200; i++) {
        if (sdX < sdY) { sdX += ddX; cmX += stepX; side = 0; }
        else { sdY += ddY; cmY += stepY; side = 1; }
        if (cmY < 0 || cmY >= grid.length || cmX < 0 || cmX >= grid[0].length) break;
        if (grid[cmY][cmX] === 1) {
          var pd;
          if (side === 0) pd = (cmX - px + (1-stepX)/2) / dirX;
          else pd = (cmY - py + (1-stepY)/2) / dirY;
          var hx = px + dirX*pd, hy = py + dirY*pd;
          return { dist: Math.abs(pd), hit: true, side: side, texX: side === 0 ? (hy%1) : (hx%1), mapX: cmX, mapY: cmY };
        }
      }
      return { dist: CFG.maxDepth, hit: false, side: 0 };
    }

    // ============================================================
    // RENDERING - Enemy is a hole showing the parent video through
    // ============================================================
    // Track enemy screen position for the cutout
    var enemyScreenInfo = null;

    function render() {
      var W = canvas.width, H = canvas.height;
      enemyScreenInfo = null;

      // Ceiling - office drop ceiling tiles
      var ceilGrad = ctx.createLinearGradient(0, 0, 0, H/2);
      ceilGrad.addColorStop(0, '#707070');
      ceilGrad.addColorStop(1, '#3a3a3a');
      ctx.fillStyle = ceilGrad;
      ctx.fillRect(0, 0, W, H/2);
      // Tile grid lines on ceiling
      var player = state.player;
      var tileSize = 2;
      for (var row = 0; row < H/2; row++) {
        var depth = H / (2 * (H/2 - row + 0.1));
        var corrD = depth;
        var worldXLeft = player.x + Math.cos(player.angle - CFG.fov/2) * corrD;
        var worldYLeft = player.y + Math.sin(player.angle - CFG.fov/2) * corrD;
        var worldXRight = player.x + Math.cos(player.angle + CFG.fov/2) * corrD;
        var worldYRight = player.y + Math.sin(player.angle + CFG.fov/2) * corrD;
        // Check for tile boundaries at this scanline
        var fogBright = Math.max(0, 1 - corrD / CFG.maxDepth);
        var distFade = fogBright * 0.15;
        for (var col = 0; col < W; col += 4) {
          var t = col / W;
          var wx = worldXLeft + (worldXRight - worldXLeft) * t;
          var wy = worldYLeft + (worldYRight - worldYLeft) * t;
          var gridLineX = Math.abs(wx % tileSize) < 0.06 || Math.abs(wx % tileSize - tileSize) < 0.06;
          var gridLineY = Math.abs(wy % tileSize) < 0.06 || Math.abs(wy % tileSize - tileSize) < 0.06;
          if (gridLineX || gridLineY) {
            ctx.fillStyle = 'rgba(20,20,20,'+distFade+')';
            ctx.fillRect(col, row, 4, 1);
          }
        }
      }

      // Floor
      var floorGrad = ctx.createLinearGradient(0, H/2, 0, H);
      floorGrad.addColorStop(0, '#111');
      floorGrad.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = floorGrad;
      ctx.fillRect(0, H/2, W, H/2);

      var player = state.player, grid = state.grid, enemy = state.enemy, exit = state.exit;
      var halfFov = CFG.fov / 2;
      var stripWidth = W / CFG.rayCount;
      var zBuffer = [];

      for (var i = 0; i < CFG.rayCount; i++) {
        var rayAngle = player.angle - halfFov + (i / CFG.rayCount) * CFG.fov;
        var result = castRayDDA(player.x, player.y, rayAngle, grid);
        var correctedDist = result.dist * Math.cos(rayAngle - player.angle);
        zBuffer[i] = correctedDist;
        if (result.hit) {
          var wallHeight = (H / correctedDist) * 1.0;
          var wallTop = (H - wallHeight) / 2;
          var brightness = Math.max(0, 1 - correctedDist / CFG.maxDepth);
          if (result.side === 1) brightness *= 0.7;
          ctx.fillStyle = 'rgb('+Math.floor(40*brightness)+','+Math.floor(80*brightness)+','+Math.floor(160*brightness)+')';
          ctx.fillRect(Math.floor(i*stripWidth), wallTop, Math.ceil(stripWidth)+1, wallHeight);
          if (result.texX !== undefined) {
            var ed = Math.min(result.texX, 1-result.texX);
            if (ed < 0.05) {
              var eb = brightness * 0.3;
              ctx.fillStyle = 'rgba('+Math.floor(20*eb)+','+Math.floor(40*eb)+','+Math.floor(100*eb)+',0.5)';
              ctx.fillRect(Math.floor(i*stripWidth), wallTop, Math.ceil(stripWidth)+1, wallHeight);
            }
            // Subtle skip icon ">>" pattern on walls, random orientation per wall tile
            var texU = result.texX;
            var patternSize = wallHeight / 3;
            if (patternSize > 6) {
              var skipAlpha = brightness * 0.12;
              var sx = Math.floor(i * stripWidth);
              // Pseudo-random hash from wall grid position
              var wallSeed = (result.mapX * 7919 + result.mapY * 104729) | 0;
              for (var py = 0; py < 3; py++) {
                var iconTop = wallTop + py * patternSize + patternSize * 0.15;
                var iconH = patternSize * 0.7;
                var iconCenterY = iconTop + iconH / 2;
                // Per-icon random orientation using wall pos + row
                var iconSeed = ((wallSeed + py * 31337) * 48611) | 0;
                var flipped = (iconSeed & 1) === 1; // horizontal flip
                var vertFlip = (iconSeed & 2) === 2; // vertical flip
                for (var tri = 0; tri < 2; tri++) {
                  var triLeft = 0.15 + tri * 0.3;
                  var triRight = 0.45 + tri * 0.3;
                  var u = flipped ? (1 - texU) : texU;
                  if (u >= triLeft && u <= triRight) {
                    var progress = (u - triLeft) / (triRight - triLeft);
                    var halfSpan = (1 - progress) * iconH / 2;
                    var stripTop, stripBot;
                    if (vertFlip) {
                      stripTop = iconCenterY - halfSpan * 0.3;
                      stripBot = iconCenterY + halfSpan;
                    } else {
                      stripTop = iconCenterY - halfSpan;
                      stripBot = iconCenterY + halfSpan * 0.3;
                    }
                    if (stripTop < wallTop) stripTop = wallTop;
                    if (stripBot > wallTop + wallHeight) stripBot = wallTop + wallHeight;
                    if (stripBot > stripTop) {
                      ctx.fillStyle = 'rgba(100,180,255,'+skipAlpha+')';
                      ctx.fillRect(sx, stripTop, Math.ceil(stripWidth)+1, stripBot - stripTop);
                    }
                  }
                }
              }
            }
          }
        }
      }

      // Teleporters
      for (var t = 0; t < state.teleporters.length; t++) {
        renderSprite(state.teleporters[t].x, state.teleporters[t].y, zBuffer, state.teleporters[t].color, 0.5, 'TELE');
      }

      // Exit
      renderSprite(exit.x, exit.y, zBuffer, '#0f0', 0.6, 'EXIT');

      // Enemy: cut a hole in the canvas so the parent video shows through
      if (enemy.active) {
        renderEnemyCutout(enemy, zBuffer);
      }
    }

    function renderEnemyCutout(enemy, zBuffer) {
      var W = canvas.width, H = canvas.height;
      var player = state.player;
      var dx = enemy.x - player.x, dy = enemy.y - player.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.1) return;

      var spriteAngle = Math.atan2(dy, dx);
      var angleDiff = spriteAngle - player.angle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      if (Math.abs(angleDiff) > CFG.fov / 2 + 0.1) return;

      var screenX = W/2 + (angleDiff / (CFG.fov/2)) * (W/2);
      var correctedDist = dist * Math.cos(angleDiff);
      var spriteHeight = (H / correctedDist) * 0.6;
      var spriteWidth = spriteHeight * (4/3); // match 640x480 aspect ratio
      var screenY = (H - spriteHeight) / 2;

      var stripW = W / CFG.rayCount;
      var startStrip = Math.max(0, Math.floor((screenX - spriteWidth/2) / stripW));
      var endStrip = Math.min(CFG.rayCount-1, Math.floor((screenX + spriteWidth/2) / stripW));

      // Per-strip occlusion check
      var hasVisible = false;
      for (var i = startStrip; i <= endStrip; i++) {
        if (zBuffer[i] > correctedDist) { hasVisible = true; break; }
      }
      if (!hasVisible) return;

      // Save enemy screen info for minimap/effects
      enemyScreenInfo = { x: screenX, y: screenY, w: spriteWidth, h: spriteHeight, dist: correctedDist };

      // Draw a red glowing border first
      var pulse = 0.6 + 0.4 * Math.sin(performance.now() / 200);
      ctx.save();
      ctx.globalAlpha = Math.max(0.3, 1 - correctedDist / 12) * pulse;
      ctx.shadowColor = '#f00';
      ctx.shadowBlur = 15 + pulse * 10;
      ctx.strokeStyle = '#f00';
      ctx.lineWidth = 3;

      // Build clip region from visible strips
      ctx.beginPath();
      var inRange = false;
      var rangeStartX = 0;
      for (var i = startStrip; i <= endStrip + 1; i++) {
        var vis = (i <= endStrip) && zBuffer[i] > correctedDist;
        if (vis && !inRange) {
          rangeStartX = i * stripW;
          inRange = true;
        } else if (!vis && inRange) {
          var rangeEndX = i * stripW;
          var clampL = Math.max(screenX - spriteWidth/2, rangeStartX);
          var clampR = Math.min(screenX + spriteWidth/2, rangeEndX);
          ctx.rect(clampL, screenY, clampR - clampL, spriteHeight);
          inRange = false;
        }
      }
      ctx.stroke();
      ctx.restore();

      // Now cut the hole - use destination-out to make pixels transparent
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      inRange = false;
      for (var i = startStrip; i <= endStrip + 1; i++) {
        var vis = (i <= endStrip) && zBuffer[i] > correctedDist;
        if (vis && !inRange) {
          rangeStartX = i * stripW;
          inRange = true;
        } else if (!vis && inRange) {
          var rangeEndX = i * stripW;
          var clampL = Math.max(screenX - spriteWidth/2, rangeStartX);
          var clampR = Math.min(screenX + spriteWidth/2, rangeEndX);
          ctx.rect(clampL, screenY, clampR - clampL, spriteHeight);
          inRange = false;
        }
      }
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fill();
      ctx.restore();
    }

    function renderSprite(sx, sy, zBuffer, color, size, label) {
      var W = canvas.width, H = canvas.height;
      var player = state.player;
      var dx = sx - player.x, dy = sy - player.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.1) return;
      var spriteAngle = Math.atan2(dy, dx);
      var angleDiff = spriteAngle - player.angle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      if (Math.abs(angleDiff) > CFG.fov / 2 + 0.1) return;
      var screenX = W/2 + (angleDiff / (CFG.fov/2)) * (W/2);
      var correctedDist = dist * Math.cos(angleDiff);
      var spriteHeight = (H / correctedDist) * size;
      var spriteWidth = spriteHeight * 0.8;
      var screenY = (H - spriteHeight) / 2;
      var startStrip = Math.max(0, Math.floor((screenX - spriteWidth/2) / (W/CFG.rayCount)));
      var endStrip = Math.min(CFG.rayCount-1, Math.floor((screenX + spriteWidth/2) / (W/CFG.rayCount)));
      var visible = false;
      for (var i = startStrip; i <= endStrip; i++) {
        if (zBuffer[i] > correctedDist) { visible = true; break; }
      }
      if (!visible) return;
      ctx.save();
      ctx.globalAlpha = Math.max(0.2, 1 - correctedDist / 12);
      if (label === 'EXIT') {
        var pulse = 0.7 + 0.3 * Math.sin(performance.now() / 200);
        ctx.fillStyle = color; ctx.globalAlpha *= pulse;
        ctx.fillRect(screenX - spriteWidth/2, screenY, spriteWidth, spriteHeight);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.strokeRect(screenX - spriteWidth/2, screenY, spriteWidth, spriteHeight);
        ctx.fillStyle = '#fff';
        ctx.font = Math.max(10, spriteHeight/4) + 'px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('SKIP', screenX, screenY + spriteHeight/2 + 5);
      } else if (label === 'TELE') {
        var t = performance.now() / 400;
        var pulse = 0.6 + 0.4 * Math.sin(t * 2);
        var radius = spriteWidth / 2;
        var glow = ctx.createRadialGradient(screenX, screenY+spriteHeight/2, 0, screenX, screenY+spriteHeight/2, radius*1.3);
        glow.addColorStop(0, color);
        glow.addColorStop(0.5, 'rgba(128,128,128,0.3)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow; ctx.globalAlpha *= pulse;
        ctx.beginPath();
        ctx.arc(screenX, screenY+spriteHeight/2, radius*1.3, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, radius/6);
        for (var seg = 0; seg < 4; seg++) {
          var a = t + seg * Math.PI/2;
          ctx.beginPath();
          ctx.arc(screenX, screenY+spriteHeight/2, radius*0.7, a, a+Math.PI/4);
          ctx.stroke();
        }
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(screenX, screenY+spriteHeight/2, radius/5, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ============================================================
    // MINIMAP
    // ============================================================
    function renderMinimap() {
      if (!debugMode) return;
      var grid = state.grid, gridW = state.gridW, gridH = state.gridH;
      var player = state.player, enemy = state.enemy, exit = state.exit;
      var mW = minimapCanvas.width, mH = minimapCanvas.height;
      var cellW = mW / gridW, cellH = mH / gridH;
      minimapCtx.fillStyle = '#000';
      minimapCtx.fillRect(0, 0, mW, mH);
      for (var y = 0; y < gridH; y++) {
        for (var x = 0; x < gridW; x++) {
          if (grid[y][x] === 1) {
            minimapCtx.fillStyle = '#224';
            minimapCtx.fillRect(x*cellW, y*cellH, cellW+0.5, cellH+0.5);
          }
        }
      }
      minimapCtx.fillStyle = '#0f0';
      minimapCtx.fillRect((exit.x-0.3)*cellW, (exit.y-0.3)*cellH, cellW*0.6, cellH*0.6);
      for (var t = 0; t < state.teleporters.length; t++) {
        var tp = state.teleporters[t];
        minimapCtx.fillStyle = tp.color;
        minimapCtx.globalAlpha = 0.6 + 0.4 * Math.sin(performance.now()/300);
        minimapCtx.beginPath();
        minimapCtx.arc(tp.x*cellW, tp.y*cellH, 3, 0, Math.PI*2);
        minimapCtx.fill();
        minimapCtx.globalAlpha = 1;
      }
      if (enemy.active) {
        minimapCtx.fillStyle = '#f00';
        minimapCtx.beginPath();
        minimapCtx.arc(enemy.x*cellW, enemy.y*cellH, 3, 0, Math.PI*2);
        minimapCtx.fill();
      }
      minimapCtx.fillStyle = '#ff0';
      minimapCtx.beginPath();
      minimapCtx.arc(player.x*cellW, player.y*cellH, 3, 0, Math.PI*2);
      minimapCtx.fill();
      minimapCtx.strokeStyle = '#ff0'; minimapCtx.lineWidth = 1;
      minimapCtx.beginPath();
      minimapCtx.moveTo(player.x*cellW, player.y*cellH);
      minimapCtx.lineTo((player.x+Math.cos(player.angle)*1.5)*cellW, (player.y+Math.sin(player.angle)*1.5)*cellH);
      minimapCtx.stroke();
    }

    // ============================================================
    // ENEMY AI
    // ============================================================
    function updateEnemy(dt) {
      var enemy = state.enemy, player = state.player, grid = state.grid;
      if (!enemy.active) {
        if (state.elapsed > CFG.enemySpawnDelay) enemy.active = true;
        return;
      }
      enemy.pathRecalcTimer -= dt;
      if (enemy.pathRecalcTimer <= 0 || enemy.path.length === 0) {
        var distToPlayer = Math.sqrt(Math.pow(enemy.x-player.x,2)+Math.pow(enemy.y-player.y,2));
        var targetX = player.x, targetY = player.y;
        if (distToPlayer < 5) {
          var fd = Math.min(distToPlayer * 0.4, 1.0);
          var fx = player.x + Math.cos(player.angle)*fd;
          var fy = player.y + Math.sin(player.angle)*fd;
          var fmx = Math.floor(fx), fmy = Math.floor(fy);
          if (fmx >= 0 && fmx < grid[0].length && fmy >= 0 && fmy < grid.length && grid[fmy][fmx] === 0) {
            targetX = fx; targetY = fy;
          }
        }
        enemy.path = bfs(grid, enemy.x, enemy.y, targetX, targetY);
        enemy.pathIndex = 0;
        enemy.pathRecalcTimer = 0.5;
      }
      if (enemy.path.length > 0 && enemy.pathIndex < enemy.path.length) {
        var target = enemy.path[enemy.pathIndex];
        var dx = target.x - enemy.x, dy = target.y - enemy.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 0.15) {
          enemy.pathIndex++;
        } else {
          var straightCount = 1;
          var rem = enemy.path.slice(enemy.pathIndex);
          for (var i = 0; i < rem.length-1; i++) {
            var sx = rem[i+1].x-rem[i].x, sy = rem[i+1].y-rem[i].y;
            var px = i===0?(rem[0].x-enemy.x):(rem[i].x-rem[i-1].x);
            var py = i===0?(rem[0].y-enemy.y):(rem[i].y-rem[i-1].y);
            var ls = Math.sqrt(sx*sx+sy*sy), lp = Math.sqrt(px*px+py*py);
            if (ls > 0.01 && lp > 0.01 && (sx*px+sy*py)/(ls*lp) > 0.9) straightCount++;
            else break;
          }
          var speedMult = 0.6 + Math.min(straightCount-1, 4) * 0.4;
          var speed = CFG.enemySpeed * speedMult * dt;
          enemy.x += (dx/dist)*speed;
          enemy.y += (dy/dist)*speed;
        }
      }
      // Push player (not into walls)
      var dx = enemy.x-player.x, dy = enemy.y-player.y;
      var dist = Math.sqrt(dx*dx+dy*dy);
      var blockR = 0.5, margin = 0.15;
      if (dist < blockR && dist > 0.001) {
        var pd = blockR - dist;
        var px = -(dx/dist)*pd, py = -(dy/dist)*pd;
        var nx = player.x + px;
        if (!isWall(grid,nx+margin,player.y) && !isWall(grid,nx-margin,player.y) &&
            !isWall(grid,nx+margin,player.y+margin) && !isWall(grid,nx-margin,player.y-margin))
          player.x = nx;
        var ny = player.y + py;
        if (!isWall(grid,player.x,ny+margin) && !isWall(grid,player.x,ny-margin) &&
            !isWall(grid,player.x+margin,ny+margin) && !isWall(grid,player.x-margin,ny-margin))
          player.y = ny;
      }
    }

    // ============================================================
    // PLAYER MOVEMENT
    // ============================================================
    function updatePlayer(dt) {
      var player = state.player, grid = state.grid, keys = state.keys;
      var moveX = 0, moveY = 0;
      var cos = Math.cos(player.angle), sin = Math.sin(player.angle);
      if (keys['w'] || keys['arrowup']) { moveX += cos*CFG.moveSpeed*dt; moveY += sin*CFG.moveSpeed*dt; }
      if (keys['s'] || keys['arrowdown']) { moveX -= cos*CFG.moveSpeed*dt; moveY -= sin*CFG.moveSpeed*dt; }
      if (keys['q']) { moveX += Math.cos(player.angle-Math.PI/2)*CFG.moveSpeed*dt; moveY += Math.sin(player.angle-Math.PI/2)*CFG.moveSpeed*dt; }
      if (keys['e']) { moveX += Math.cos(player.angle+Math.PI/2)*CFG.moveSpeed*dt; moveY += Math.sin(player.angle+Math.PI/2)*CFG.moveSpeed*dt; }
      if (keys['a'] || keys['arrowleft']) player.angle -= CFG.rotSpeed * dt;
      if (keys['d'] || keys['arrowright']) player.angle += CFG.rotSpeed * dt;
      while (player.angle > Math.PI*2) player.angle -= Math.PI*2;
      while (player.angle < 0) player.angle += Math.PI*2;
      var margin = 0.15;
      var newX = player.x + moveX;
      if (!isWall(grid,newX+margin,player.y) && !isWall(grid,newX-margin,player.y) &&
          !isWall(grid,newX+margin,player.y+margin) && !isWall(grid,newX-margin,player.y-margin) &&
          !isWall(grid,newX+margin,player.y-margin) && !isWall(grid,newX-margin,player.y+margin))
        player.x = newX;
      var newY = player.y + moveY;
      if (!isWall(grid,player.x,newY+margin) && !isWall(grid,player.x,newY-margin) &&
          !isWall(grid,player.x+margin,newY+margin) && !isWall(grid,player.x-margin,newY-margin) &&
          !isWall(grid,player.x+margin,newY-margin) && !isWall(grid,player.x-margin,newY+margin))
        player.y = newY;
      if (state.teleportCooldown > 0) state.teleportCooldown -= dt;
      if (state.teleportCooldown <= 0) {
        for (var i = 0; i < state.teleporters.length; i++) {
          var tp = state.teleporters[i];
          var tdx = player.x-tp.x, tdy = player.y-tp.y;
          if (Math.sqrt(tdx*tdx+tdy*tdy) < 0.45) {
            var dest = state.teleporters[tp.pairIdx];
            player.x = dest.x; player.y = dest.y;
            state.teleportCooldown = 1.5;
            playTeleportSfx();
            break;
          }
        }
      }
      var dx = player.x-state.exit.x, dy = player.y-state.exit.y;
      if (Math.sqrt(dx*dx+dy*dy) < 0.5) { state.won = true; state.running = false; }
    }

    function isWall(grid, x, y) {
      var mx = Math.floor(x), my = Math.floor(y);
      if (my < 0 || my >= grid.length || mx < 0 || mx >= grid[0].length) return true;
      return grid[my][mx] === 1;
    }

    // ============================================================
    // AUDIO (oscillator-based, no external files)
    // ============================================================
    var audioCtx = null, teleportSfxBuffer = null;

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      var sr = audioCtx.sampleRate, len = Math.floor(sr*0.4);
      teleportSfxBuffer = audioCtx.createBuffer(1, len, sr);
      var data = teleportSfxBuffer.getChannelData(0);
      for (var i = 0; i < len; i++) {
        var t = i/sr; data[i] = Math.sin(2*Math.PI*(800-t*1500)*t)*Math.max(0,1-t/0.4)*0.4;
      }
    }

    function playTeleportSfx() {
      if (!audioCtx || !teleportSfxBuffer) return;
      var src = audioCtx.createBufferSource();
      src.buffer = teleportSfxBuffer; src.connect(audioCtx.destination); src.start();
    }

    function updateAudio() {
      if (!state || !state.running || !state.enemy.active) {
        shellMsg({ type: 'setVolume', value: 0.05 });
        return;
      }
      var player = state.player, enemy = state.enemy;
      var dx = enemy.x-player.x, dy = enemy.y-player.y;
      var dist = Math.sqrt(dx*dx+dy*dy);
      // Volume: louder when enemy is closer (quadratic), min 0.05 so you always hear a hint
      var proximity = Math.max(0, 1 - dist / 14);
      var volume = 0.05 + proximity * proximity * 0.95;
      shellMsg({ type: 'setVolume', value: volume });
    }

    // ============================================================
    // VIDEO EFFECTS (mess with the shell's video)
    // ============================================================
    function updateVideoEffects() {
      if (!state || !state.running) return;
      var enemy = state.enemy, player = state.player;
      if (!enemy.active) {
        shellMsg({ type: 'setVideoFilter', value: 'none' });
        return;
      }
      var dx = enemy.x-player.x, dy = enemy.y-player.y;
      var dist = Math.sqrt(dx*dx+dy*dy);
      var proximity = Math.max(0, 1 - dist / 8);

      // Slow down video as enemy gets closer
      shellMsg({ type: 'setPlaybackRate', value: Math.max(0.2, 1.0 - proximity * 0.8) });

      // Distort video when enemy is close — the "ad" glitches
      if (proximity > 0.4) {
        var intensity = (proximity - 0.4) / 0.6;
        var hue = Math.sin(performance.now() / 150) * intensity * 90;
        var sat = 1 + intensity * 3;
        var bright = 1 + Math.sin(performance.now() / 100) * intensity * 0.3;
        shellMsg({ type: 'setVideoFilter', value: 'hue-rotate('+hue.toFixed(0)+'deg) saturate('+sat.toFixed(1)+') brightness('+bright.toFixed(2)+')' });
      } else {
        shellMsg({ type: 'setVideoFilter', value: 'none' });
      }
    }

    // ============================================================
    // HUD
    // ============================================================
    function updateHUD() {
      if (!state || !state.running) return;
      var enemy = state.enemy, player = state.player, exit = state.exit;
      var exitDist = Math.sqrt(Math.pow(exit.x-player.x,2)+Math.pow(exit.y-player.y,2));
      var eDist = Math.sqrt(Math.pow(enemy.x-player.x,2)+Math.pow(enemy.y-player.y,2));
      var warning = '';
      if (enemy.active && eDist < 3) {
        var flash = Math.sin(performance.now()/(100+(1-eDist/3)*200)) > 0;
        if (flash) warning = '<span style="color:#f00;font-size:14px">AD IS CLOSING IN</span><br>';
      }
      var info = '<span style="color:#aaa;font-size:11px">WASD/Arrows: move | Q/E: strafe</span><br>';
      if (debugMode) info += '<span style="color:#0f0">Skip: '+exitDist.toFixed(1)+'m</span> | ';
      info += '<span style="color:#f88">Time: '+state.elapsed.toFixed(1)+'s</span>';
      hud.innerHTML = warning + info;
    }

    // ============================================================
    // GAME LOOP
    // ============================================================
    var lastTime = 0;

    function gameLoop(timestamp) {
      var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      if (state && state.running) {
        state.elapsed += dt;
        updatePlayer(dt);
        updateEnemy(dt);
        updateAudio();
        updateVideoEffects();
      }
      if (state) {
        render();
        renderMinimap();
        updateHUD();
      }
      if (state && state.won && !state.endShown) {
        state.endShown = true;
        shellMsg({ type: 'setVideoFilter', value: 'none' });
        shellMsg({ type: 'setPlaybackRate', value: 1 });
        adSuccess();
      }
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // INPUT
    // ============================================================
    window.addEventListener('keydown', function(e) {
      if (!state) return;
      state.keys[e.key.toLowerCase()] = true;
      if (['arrowup','arrowdown','arrowleft','arrowright'].indexOf(e.key.toLowerCase()) !== -1) e.preventDefault();
    });
    window.addEventListener('keyup', function(e) {
      if (!state) return;
      state.keys[e.key.toLowerCase()] = false;
    });

    // ============================================================
    // PAUSE ON FOCUS LOSS
    // ============================================================
    var paused = false;
    var wasRunning = false;

    function pauseGame() {
      if (!state || !state.running || paused) return;
      paused = true;
      wasRunning = true;
      state.running = false;
      state.keys = {};
      shellMsg({ type: 'pause' });
      gameOverlay.classList.remove('hidden');
      gameOverlay.innerHTML = '<h1 style="font-size:28px">PAUSED</h1><div class="sub">Click to resume</div>';
    }

    function resumeGame() {
      if (!paused || !wasRunning) return;
      paused = false;
      wasRunning = false;
      state.running = true;
      shellMsg({ type: 'play' });
      gameOverlay.classList.add('hidden');
    }

    window.addEventListener('blur', pauseGame);
    document.addEventListener('mouseleave', pauseGame);

    document.addEventListener('click', function() {
      if (paused) resumeGame();
    });

    // ============================================================
    // SHELL MESSAGES
    // ============================================================
    var adReady = false;

    function startMaze() {
      if (state && state.running) return;
      initGame();
      state.running = true;
      state.startTime = performance.now();
      gameOverlay.classList.add('hidden');
      if (!audioCtx) initAudio();
      else audioCtx.resume();
    }

    var debugMode = false;

    // Require mouse click inside the iframe to start
    // Cmd/Ctrl + Shift + Click = debug mode
    document.addEventListener('click', function(e) {
      if (!adReady) return;
      if (!state || !state.running) {
        debugMode = (e.metaKey || e.ctrlKey) && e.shiftKey;
        minimapCanvas.style.display = debugMode ? 'block' : 'none';
      }
      startMaze();
    });

    window.addEventListener('message', function(event) {
      if (!event.data || !event.data.type) return;
      if (event.data.type === 'adStarted') {
        adReady = true;
        gameOverlay.querySelector('h1').textContent = 'Looking to skip the ad?';
        gameOverlay.querySelector('.sub').textContent = 'Click to begin navigating to the skip.';
      }
      if (event.data.type === 'adFinished') {
        if (state && !state.won) {
          window.top.postMessage({ type: 'fail' }, '*');
        }
      }
    });

    // ============================================================
    // INIT
    // ============================================================
    initGame();
    requestAnimationFrame(gameLoop);

  })(window, document);
  </script>
</body>
</html>
